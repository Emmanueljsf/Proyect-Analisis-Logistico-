name: SIAL-MED Continuous Integration

on:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargar codigo del repositorio
      uses: actions/checkout@v3

    - name: 2. Configurar entorno de Python (Tu versión local)
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'

    - name: 3. Instalar TODAS las dependencias reales del proyecto
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. Verificación inicial de sintaxis (Linter)
      run: |
        python -m compileall .