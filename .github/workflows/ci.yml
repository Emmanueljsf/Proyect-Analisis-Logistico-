name: SIAL-MED Continuous Integration

on:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargar codigo del repositorio
      uses: actions/checkout@v3

    - name: 2. Configurar entorno de Python (Tu versión local)
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'

    - name: 3. Instalar dependencias y ejecutar verificación lógica
      run: |
        pip install -r requirements.txt
        pip install flake8
        python -m flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics